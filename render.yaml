services:
  # 1. Spring Boot Backend Service
  - type: web
    name: knowledge-portal-backend
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: knowledge-portal-postgres
          property: connectionString

  # 2. Node.js Comments Service
  - type: web
    name: knowledge-portal-comments
    env: node
    rootDir: node-backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        value: mongodb://knowledge-portal-mongodb:27017/knowledge_portal

  # 3. FastAPI Gateway Service
  - type: web
    name: knowledge-portal-gateway
    env: python
    rootDir: gateway
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SPRING_BOOT_URL
        value: https://knowledge-portal-backend.onrender.com
      - key: NODE_JS_URL
        value: https://knowledge-portal-comments.onrender.com

  # 4. MongoDB Database Service (Private Internal Service)
  - type: pserv
    name: knowledge-portal-mongodb
    image: mongo:6.0
    plan: free
    disk:
      name: mongodb-data
      mountPath: /data/db
      sizeGB: 1

staticSites:
  - name: knowledge-portal-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Access-Control-Allow-Origin
        value: "*"
    envVars:
      - key: VITE_API_BASE
        value: https://knowledge-portal-gateway.onrender.com/api

databases:
  - name: knowledge-portal-postgres
    databaseName: knowledge_portal
    user: knowledge_user
    plan: free
